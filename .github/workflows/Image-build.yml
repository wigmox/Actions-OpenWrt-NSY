name: Image-build

on:

  workflow_dispatch:

    inputs:
      BUILDER:
        description: image-builder
        required: true
        default: https://github.com/robinZhao/Actions-OpenWrt-NSY/releases/download/2026.01.29-22.27_all_in-openwrt-g68-plus/2026.01.29_all_in-openwrt-imagebuilder-25.12.0-rc3-rockchip-armv8.Linux-x86_64.tar.zst
        type: string

      PACKAGES:
        description: 软件包
        required: true
        default: 'kmod-cfg80211 kmod-mac80211 kmod-mt76-connac kmod-mt76-core kmod-mt7915e kmod-mt7916-firmware  wpad-mesh-openssl  wifi-scripts 
          iwinfo wireless-tools wireless-regdb 
          kmod-button-hotplug kmod-leds-gpio 
          kmod-fs-vfat kmod-fs-ntfs3 kmod-fs-ext4 kmod-fs-exfat 
          luci luci-ssl-openssl luci-compat luci-i18n-base-zh-cn 
          luci-i18n-firewall-zh-cn luci-app-samba4 luci-i18n-samba4-zh-cn luci-app-upnp 
          luci-i18n-upnp-zh-cn luci-app-https-dns-proxy luci-i18n-https-dns-proxy-zh-cn 
          luci-app-adblock luci-i18n-adblock-zh-cn luci-app-wol luci-i18n-wol-zh-cn kmod-tun 
          luci-i18n-package-manager-zh-cn luci-i18n-attendedsysupgrade-zh-cn 
          zerotier tcpdump block-mount ca-bundle openssl-util 
          kmod-oaf luci-app-oaf luci-i18n-oaf-zh-cn openssh-sftp-server -libustream-mbedtls libustream-openssl -apk-mbedtls apk-openssl'
        type: string

      OVERFILES:
        description: '覆盖文件'
        required: true
        default: 'sw'
        type: choice
        options:
          - sw
          - dsa

      SUFFIX:
        description: '生成后缀'
        required: false
        default: ''
        type: string

      TERMINAL:
        description: 终端调试
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write         
  
env:

  SDK_URL: ${{ inputs.BUILDER }}
  TZ: Asia/Shanghai
  GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}
  SIGN_KEY: ${{ secrets.PRIVATE_SIGN_KEY }}
  SIGN_PUB_KEY: ${{ secrets.PUBLIC_SIGN_KEY }}

jobs:
  Build:
    runs-on: ubuntu-24.04
    environment:
    #  url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      COMMIT_AUTHOR: ${{ steps.clone.outputs.COMMIT_AUTHOR }}
      COMMIT_DATE: ${{ steps.clone.outputs.COMMIT_DATE }}
      COMMIT_MESSAGE: ${{ steps.clone.outputs.COMMIT_MESSAGE }}
      COMMIT_HASH: ${{ steps.clone.outputs.COMMIT_HASH }}
      DEVICE_TARGET: ${{ steps.variable.outputs.DEVICE_TARGET }}
      DEVICE_SUBTARGET: ${{ steps.variable.outputs.DEVICE_SUBTARGET }}

    steps:
    - name: 合并磁盘
      uses: easimon/maximize-build-space@master
      with:
        swap-size-mb: 1024
        temp-reserve-mb: 100
        root-reserve-mb: 1024

    - name: 准备完成
      uses: actions/checkout@main

    - name: 创建工作目录
      run: |
        mkdir -p ${GITHUB_WORKSPACE}/workdir
        chmod 755 ${GITHUB_WORKSPACE}/workdir
        sudo chown $USER:$GROUPS ${GITHUB_WORKSPACE}/workdir
        echo "WORKDIR=$PWD" >> $GITHUB_ENV

    - name: 检查服务器性能
      run: |
        echo "警告⚠"
        echo "分配的服务器性能有限，若选择的插件过多，务必注意CPU性能！"
        echo -e "已知CPU型号(降序): 7763，8370C，8272CL，8171M，E5-2673\n"
        echo "--------------------------CPU信息--------------------------"
        echo "CPU物理数量: $(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
        echo "CPU核心数量: $(nproc)"
        echo -e "CPU型号信息:$(cat /proc/cpuinfo | grep -m1 name | awk -F: '{print $2}')\n"
        echo "--------------------------内存信息--------------------------"
        echo "已安装内存详细信息:"
        echo -e "$(sudo lshw -short -C memory | grep GiB)\n"
        echo "--------------------------硬盘信息--------------------------"
        echo "硬盘数量: $(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT

   

    - name: 初始化环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        df -hT
        echo "------------------------------- 安装依赖 -------------------------------"

        sudo -E apt-get -qq update
        sudo -E apt-get -y install build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
        python3-setuptools rsync swig unzip zlib1g-dev file wget \
        libpython3-dev python3 python3-pip python3-cryptography python3-docutils \
        python3-ply python3-pyelftools python3-requests  clang llvm

        echo "------------------------------- 设置工作目录及时区 -------------------------------"
        sudo timedatectl set-timezone "$TZ"

    - name: 设置源代码变量
      # working-directory: ${{ env.WORKDIR }}/workdir
      id: setenv
      run: |
        echo "DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
        echo "TAG_DATE=$(date +"%Y.%m.%d-%H.%M")" >> $GITHUB_ENV

    - name: 下载sdk
      working-directory: ${{ env.WORKDIR }}/workdir
      id: download
      run: |
        wget -q  ${{ env.SDK_URL }}
        tar -I zstd -xf *.tar.zst
        mv openwrt-imagebuilder* sdk
        cd sdk
        echo -e "$SIGN_KEY" >> private-key.pem
        echo -e "$SIGN_PUB_KEY" >> public-key.pem
        echo "SDK_PATH=$PWD" >> $GITHUB_ENV


    - name: 编译packages
      id: compile
      continue-on-error: true
      run: |
        cd ${{ env.SDK_PATH }}
        downloadurl=$(grep releases include/version.mk|grep -o 'http[^)]*')
        touch ./repositories
        #echo $downloadurl/targets/rockchip/armv8/packages/packages.adb >> ./repositories
        #echo $downloadurl/packages/aarch64_generic/base/packages.adb >> ./repositories
        #echo $downloadurl/packages/aarch64_generic/luci/packages.adb >> ./repositories
        #echo $downloadurl/packages/aarch64_generic/packages/packages.adb >> ./repositories
        #echo $downloadurl/packages/aarch64_generic/routing/packages.adb >> ./repositories
        #echo $downloadurl/packages/aarch64_generic/telephony/packages.adb >> ./repositories
        #echo $downloadurl/packages/aarch64_generic/video/packages.adb >> ./repositories
        # standalone not read repositories
        cp -rp $GITHUB_WORKSPACE/image-builder/* ./
        echo "#!/bin/bash" > mkimage.sh
        swtype="${{ inputs.SUFFIX }}"
        SWPACKAGES="kmod-switch-rtl8367b swconfig  -kmod-dsa -kmod-phy-realtek -kmod-dsa-realtek -kmod-dsa-rtl8365mb"
        if [ $swtype == 'dsa' ];then SWPACKAGES="-kmod-switch-rtl8367b -swconfig  +kmod-dsa +kmod-phy-realtek +kmod-dsa-realtek +kmod-dsa-rtl8365mb"; fi;
        echo "make image PROFILE=nsy_g68-plus FILES=${{ inputs.OVERFILES }} EXTRA_IMAGE_NAME=${{ inputs.SUFFIX }} PACKAGES=\"${{ inputs.PACKAGES }} ${SWPACKAGES}\"" >> mkimage.sh
        cat mkimage.sh
        chmod +x *.sh
        ./mkimage.sh
        mkdir bin/dist
        echo "FIRMWARE_PATH=$PWD/bin/dist" >> $GITHUB_ENV
        cd bin/targets/rockchip/armv8/
        for file in *-sysupgrade.img.gz; do [ -e "$file" ] || continue; mv "$file" "../../../dist/$(date +"%Y.%m.%d")-$file"; done
        echo "status=success" >> $GITHUB_OUTPUT

    - name: ssh连接
      uses: mxschmitt/action-tmate@v3
      if: ${{ inputs.TERMINAL || (steps.compile.outputs.status != 'success') }}
      
    - name: 上传发布固件
      if: steps.compile.outputs.status == 'success'
      uses: ncipollo/release-action@v1.20.0
      with:
        name: image-build-${{ env.TAG_DATE }}
        commit: ${{ github.sha }}
        allowUpdates: true
        tag: ${{ env.TAG_DATE }}-image-build 
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: ${{ env.FIRMWARE_PATH }}/*
        body: |
          builder
          ${{ env.SDK_URL }}
          **This is OpenWrt Packages**
          ```
          ${{ inputs.PACKAGES }}
          ```
          

